<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XOX — Play Online</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
  :root {
    --bg: #f4f2ec;
    --bg2: #eae7dd;
    --surface: #ffffff;
    --surface-hover: #fafaf6;
    --border: #d6d3c8;
    --border-light: #e8e5db;
    --x-color: #6b7c3e;
    --x-light: #8a9e55;
    --x-bg: rgba(107,124,62,0.08);
    --x-glow: rgba(107,124,62,0.25);
    --o-color: #b07042;
    --o-light: #c98a5c;
    --o-bg: rgba(176,112,66,0.08);
    --o-glow: rgba(176,112,66,0.25);
    --text: #3a3a32;
    --text-secondary: #6e6e60;
    --muted: #9e9c8f;
    --accent: #6b7c3e;
    --win-color: #d4a843;
    --win-glow: rgba(212,168,67,0.35);
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.08);
    --radius: 16px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    -webkit-font-smoothing: antialiased;
  }

  /* Soft decorative shapes */
  body::before {
    content: '';
    position: fixed;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(107,124,62,0.06) 0%, transparent 70%);
    top: -180px; right: -120px;
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(176,112,66,0.05) 0%, transparent 70%);
    bottom: -120px; left: -80px;
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    width: 100%;
    max-width: 440px;
    padding: 24px 20px;
  }

  /* ─── Header ─── */
  .header {
    text-align: center;
    opacity: 0;
    animation: fadeIn 0.5s 0.1s forwards;
  }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 2.8rem;
    font-weight: 400;
    color: var(--text);
    letter-spacing: 0.08em;
    line-height: 1;
    margin-bottom: 6px;
  }
  .logo span:nth-child(1) { color: var(--x-color); }
  .logo span:nth-child(2) { color: var(--muted); }
  .logo span:nth-child(3) { color: var(--o-color); }
  .tagline {
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.14em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* ─── Status bar ─── */
  .status-bar {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: var(--radius);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: var(--shadow-sm);
    opacity: 0;
    animation: fadeIn 0.5s 0.2s forwards;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: all 0.4s;
  }
  .status-dot.waiting { background: var(--o-light); animation: softBlink 1.6s infinite; }
  .status-dot.connected { background: var(--x-color); box-shadow: 0 0 6px var(--x-glow); }
  .status-dot.error { background: #c45; box-shadow: 0 0 6px rgba(204,68,85,0.3); }
  @keyframes softBlink { 0%,100%{opacity:1} 50%{opacity:0.35} }
  .status-text { font-size: 0.88rem; color: var(--text-secondary); flex: 1; }
  .status-text strong { font-weight: 700; color: var(--text); }

  /* ─── Player badges ─── */
  .player-row {
    display: flex;
    gap: 12px;
    width: 100%;
    opacity: 0;
    animation: fadeIn 0.5s 0.3s forwards;
  }
  .player-badge {
    flex: 1;
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    border: 2px solid var(--border-light);
    transition: all 0.35s ease;
    box-shadow: var(--shadow-sm);
    position: relative;
  }
  .x-badge.active-turn {
    border-color: var(--x-color);
    background: var(--x-bg);
    box-shadow: var(--shadow-md), 0 0 0 3px rgba(107,124,62,0.08);
  }
  .o-badge.active-turn {
    border-color: var(--o-color);
    background: var(--o-bg);
    box-shadow: var(--shadow-md), 0 0 0 3px rgba(176,112,66,0.08);
  }
  .badge-symbol {
    font-family: 'DM Serif Display', serif;
    font-size: 1.8rem;
    line-height: 1;
  }
  .x-badge .badge-symbol { color: var(--x-color); }
  .o-badge .badge-symbol { color: var(--o-color); }
  .badge-label { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; }
  .badge-score {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
  }
  .x-badge .badge-score { color: var(--x-color); }
  .o-badge .badge-score { color: var(--o-color); }
  .you-tag {
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    padding: 2px 10px;
    border-radius: 20px;
    text-transform: uppercase;
    color: #fff;
  }
  .x-badge .you-tag { background: var(--x-color); }
  .o-badge .you-tag { background: var(--o-color); }

  /* ─── Board ─── */
  .board-wrap {
    position: relative;
    opacity: 0;
    animation: fadeIn 0.5s 0.35s forwards;
  }
  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    width: 330px; height: 330px;
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    background: var(--surface);
    border: 1px solid var(--border-light);
    box-shadow: var(--shadow-lg);
    gap: 1px;
  }

  .cell {
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
    background: var(--surface);
  }
  .cell:hover:not(.taken):not(.disabled) {
    background: var(--bg2);
  }
  .cell.taken { cursor: default; }
  .cell.disabled { cursor: not-allowed; }

  /* Subtle grid lines */
  .cell:nth-child(1), .cell:nth-child(2), .cell:nth-child(3) { border-bottom: 1px solid var(--border-light); }
  .cell:nth-child(4), .cell:nth-child(5), .cell:nth-child(6) { border-bottom: 1px solid var(--border-light); }
  .cell:nth-child(1), .cell:nth-child(4), .cell:nth-child(7) { border-right: 1px solid var(--border-light); }
  .cell:nth-child(2), .cell:nth-child(5), .cell:nth-child(8) { border-right: 1px solid var(--border-light); }

  .cell-inner {
    width: 72px; height: 72px;
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }

  /* X symbol — two crossing bars */
  .sym-x::before, .sym-x::after {
    content: '';
    position: absolute;
    width: 48px; height: 4.5px;
    background: var(--x-color);
    border-radius: 3px;
    transform-origin: center;
    transform: scaleX(0);
  }
  .sym-x::before { transform: rotate(45deg) scaleX(0); }
  .sym-x::after { transform: rotate(-45deg) scaleX(0); }
  .sym-x.revealed::before { transform: rotate(45deg) scaleX(1); transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .sym-x.revealed::after { transform: rotate(-45deg) scaleX(1); transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) 0.06s; }

  /* O symbol — circle ring */
  .sym-o {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 4.5px solid var(--o-color);
    transform: scale(0);
  }
  .sym-o.revealed { transform: scale(1); transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1); }

  /* Win line */
  #win-line-el {
    transition: opacity 0.4s;
  }

  /* Win cell highlight */
  .cell.winning { background: rgba(212,168,67,0.1) !important; }
  .cell.winning .sym-x::before,
  .cell.winning .sym-x::after {
    background: var(--win-color);
  }
  .cell.winning .sym-o {
    border-color: var(--win-color);
  }

  /* ─── Result overlay ─── */
  .result-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(244,242,236,0.92);
    backdrop-filter: blur(6px);
    border-radius: 20px;
    z-index: 20;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s;
    gap: 6px;
  }
  .result-overlay.show { opacity: 1; pointer-events: all; }
  .result-text {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    text-align: center;
    color: var(--text);
  }
  .result-sub { font-size: 0.85rem; color: var(--muted); }
  .result-again {
    margin-top: 12px;
    padding: 10px 28px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: var(--shadow-md);
  }
  .result-again:hover { transform: translateY(-1px); box-shadow: var(--shadow-lg); }

  /* ─── Share panel ─── */
  .share-panel {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: var(--radius);
    padding: 16px 18px;
    box-shadow: var(--shadow-sm);
    opacity: 0;
    animation: fadeIn 0.5s 0.45s forwards;
  }
  .share-label {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .share-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .share-url {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text-secondary);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .copy-btn {
    padding: 10px 18px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .copy-btn:hover { background: var(--border-light); }
  .copy-btn.copied { color: var(--x-color); border-color: var(--x-color); background: var(--x-bg); }

  /* ─── New game button ─── */
  .new-game-btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: var(--shadow-md);
    opacity: 0;
    animation: fadeIn 0.5s 0.5s forwards;
  }
  .new-game-btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-lg); }

  /* ─── Loading screen ─── */
  #loading-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    gap: 24px;
    transition: opacity 0.5s;
  }
  #loading-screen.hidden { opacity: 0; pointer-events: none; }
  .loading-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 3rem;
    color: var(--text);
    letter-spacing: 0.08em;
  }
  .loading-logo span:nth-child(1) { color: var(--x-color); }
  .loading-logo span:nth-child(2) { color: var(--muted); }
  .loading-logo span:nth-child(3) { color: var(--o-color); }
  .loading-dots {
    display: flex; gap: 10px;
  }
  .loading-dots span {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border);
    animation: dotBounce 1.2s infinite;
  }
  .loading-dots span:nth-child(1) { background: var(--x-color); }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; background: var(--muted); }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; background: var(--o-color); }
  @keyframes dotBounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
    40% { transform: scale(1); opacity: 1; }
  }
  .loading-msg {
    font-size: 0.85rem;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  /* ─── Disconnect notice ─── */
  .disconnect-notice {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: #fff5f5;
    border: 1px solid #ecc;
    color: #a44;
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 0.85rem;
    font-weight: 500;
    z-index: 50;
    box-shadow: var(--shadow-md);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .disconnect-notice.show { transform: translateX(-50%) translateY(0); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ─── Responsive ─── */
  @media (max-width: 400px) {
    .board { width: 290px; height: 290px; }
    .cell-inner { width: 60px; height: 60px; }
    .sym-x::before, .sym-x::after { width: 40px; }
    .sym-o { width: 40px; height: 40px; }
    .logo { font-size: 2.2rem; }
  }
</style>
</head>
<body>

<!-- Loading screen -->
<div id="loading-screen">
  <div class="loading-logo"><span>X</span><span>O</span><span>X</span></div>
  <div class="loading-dots"><span></span><span></span><span></span></div>
  <div class="loading-msg" id="loading-msg">Initializing connection...</div>
</div>

<!-- Main UI -->
<div class="container" id="app">
  <div class="header">
    <div class="logo"><span>X</span><span>O</span><span>X</span></div>
    <div class="tagline">Play with a friend online</div>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <div class="status-text" id="status-text">Connecting...</div>
  </div>

  <div class="player-row">
    <div class="player-badge x-badge" id="badge-x">
      <div class="badge-symbol">X</div>
      <div class="badge-label">Player X</div>
      <div class="badge-score" id="score-x">0</div>
    </div>
    <div class="player-badge o-badge" id="badge-o">
      <div class="badge-symbol">O</div>
      <div class="badge-label">Player O</div>
      <div class="badge-score" id="score-o">0</div>
    </div>
  </div>

  <div class="board-wrap">
    <div class="board" id="board">
      <div class="cell" data-i="0"><div class="cell-inner"></div></div>
      <div class="cell" data-i="1"><div class="cell-inner"></div></div>
      <div class="cell" data-i="2"><div class="cell-inner"></div></div>
      <div class="cell" data-i="3"><div class="cell-inner"></div></div>
      <div class="cell" data-i="4"><div class="cell-inner"></div></div>
      <div class="cell" data-i="5"><div class="cell-inner"></div></div>
      <div class="cell" data-i="6"><div class="cell-inner"></div></div>
      <div class="cell" data-i="7"><div class="cell-inner"></div></div>
      <div class="cell" data-i="8"><div class="cell-inner"></div></div>
      <svg id="win-svg" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:10;" viewBox="0 0 330 330">
        <line id="win-line-el" x1="0" y1="0" x2="0" y2="0" stroke="var(--win-color)" stroke-width="4" stroke-linecap="round" opacity="0"
          style="filter:drop-shadow(0 0 6px var(--win-color));transition:opacity 0.4s"/>
      </svg>
      <div class="result-overlay" id="result-overlay">
        <div class="result-text" id="result-text"></div>
        <div class="result-sub" id="result-sub"></div>
        <button class="result-again" id="result-again-btn">Play Again</button>
      </div>
    </div>
  </div>

  <div class="share-panel" id="share-panel">
    <div class="share-label">Share this link to invite a friend</div>
    <div class="share-row">
      <div class="share-url" id="share-url">Generating link...</div>
      <button class="copy-btn" id="copy-btn">Copy</button>
    </div>
  </div>

  <button class="new-game-btn" id="new-game-btn">New Game Room</button>
</div>

<div class="disconnect-notice" id="disconnect-notice">Opponent disconnected from the game</div>

<script>
(function() {
  // ──── Game State ────
  const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  let board = Array(9).fill(null);
  let scores = { X: 0, O: 0 };
  let myRole = null;
  let currentTurn = 'X';
  let gameOver = false;
  let peer = null;
  let conn = null;
  let isHost = false;
  let myPeerId = null;

  // ──── DOM ────
  const cells = document.querySelectorAll('.cell');
  const statusDot = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  const shareUrl = document.getElementById('share-url');
  const copyBtn = document.getElementById('copy-btn');
  const loadingScreen = document.getElementById('loading-screen');
  const loadingMsg = document.getElementById('loading-msg');
  const resultOverlay = document.getElementById('result-overlay');
  const resultText = document.getElementById('result-text');
  const resultSub = document.getElementById('result-sub');
  const resultAgainBtn = document.getElementById('result-again-btn');
  const newGameBtn = document.getElementById('new-game-btn');
  const sharePanel = document.getElementById('share-panel');
  const winLine = document.getElementById('win-line-el');
  const badgeX = document.getElementById('badge-x');
  const badgeO = document.getElementById('badge-o');
  const disconnectNotice = document.getElementById('disconnect-notice');

  // ──── Determine if joining ────
  const urlParams = new URLSearchParams(window.location.search);
  const hostId = urlParams.get('game');
  isHost = !hostId;

  // ──── Init PeerJS ────
  function initPeer() {
    loadingMsg.textContent = isHost ? 'Creating game room...' : 'Joining game...';

    peer = new Peer(undefined, {
      host: '0.peerjs.com',
      port: 443,
      path: '/',
      secure: true,
      debug: 0
    });

    peer.on('open', (id) => {
      myPeerId = id;
      if (isHost) {
        myRole = 'X';
        setupHostUI(id);
      } else {
        myRole = 'O';
        connectToHost(hostId);
      }
    });

    peer.on('error', (err) => {
      console.error('Peer error:', err);
      if (err.type === 'peer-unavailable') {
        loadingMsg.textContent = 'Game room not found. It may have expired.';
        setStatus('error', 'Game not found — ask for a new link');
      } else {
        loadingMsg.textContent = 'Connection error. Try refreshing.';
        setStatus('error', 'Connection error — try refreshing');
      }
      hideLoading();
    });

    if (isHost) {
      peer.on('connection', (c) => {
        if (conn && conn.open) {
          c.on('open', () => c.close());
          return;
        }
        conn = c;
        setupConnection();
      });
    }
  }

  function setupHostUI(id) {
    const link = window.location.origin + window.location.pathname + '?game=' + id;
    shareUrl.textContent = link;
    sharePanel.style.display = '';
    newGameBtn.style.display = '';
    setStatus('waiting', 'Waiting for opponent to join...');
    hideLoading();
    addYouTag('X');
    updateTurnUI();
  }

  function connectToHost(hostPeerId) {
    conn = peer.connect(hostPeerId, { reliable: true });
    setupConnection();
    conn.on('open', () => {
      sharePanel.style.display = 'none';
      newGameBtn.style.display = 'none';
      setStatus('connected', 'Connected! <strong>You are O</strong>');
      addYouTag('O');
      hideLoading();
      updateTurnUI();
    });
    conn.on('error', () => {
      setStatus('error', 'Could not connect to host. Link may be expired.');
      hideLoading();
    });
  }

  function setupConnection() {
    conn.on('open', () => {
      if (isHost) {
        setStatus('connected', 'Opponent connected! <strong>You are X</strong>');
        send({ type: 'sync', board, currentTurn, scores });
      }
    });
    conn.on('data', handleMessage);
    conn.on('close', () => {
      setStatus('error', 'Opponent disconnected');
      showDisconnect();
    });
  }

  function send(data) {
    if (conn && conn.open) conn.send(data);
  }

  // ──── Message handler ────
  function handleMessage(msg) {
    switch(msg.type) {
      case 'sync':
        board = msg.board;
        currentTurn = msg.currentTurn;
        scores = msg.scores;
        renderBoard();
        updateTurnUI();
        updateScores();
        break;
      case 'move':
        if (board[msg.index] !== null) return;
        applyMove(msg.index, msg.player, false);
        break;
      case 'reset':
        doReset(false);
        break;
    }
  }

  // ──── Cell click ────
  cells.forEach(cell => {
    cell.addEventListener('click', () => {
      const i = parseInt(cell.dataset.i);
      if (gameOver) return;
      if (!conn || !conn.open) return;
      if (board[i] !== null) return;
      if (currentTurn !== myRole) return;
      applyMove(i, myRole, true);
    });
  });

  function applyMove(index, player, broadcast) {
    board[index] = player;
    renderCell(index, player);
    if (broadcast) send({ type: 'move', index, player });

    const result = checkWin();
    if (result) {
      gameOver = true;
      highlightWin(result.combo, result.winner);
      setTimeout(() => {
        if (result.winner === 'draw') {
          showResult("It's a draw", 'Well played by both sides', '');
        } else {
          scores[result.winner]++;
          updateScores();
          const youWon = result.winner === myRole;
          showResult(
            result.winner + ' wins!',
            youWon ? 'Victory is yours!' : 'Better luck next time',
            result.winner
          );
        }
      }, 500);
    } else {
      currentTurn = player === 'X' ? 'O' : 'X';
      updateTurnUI();
    }
  }

  // ──── Win check ────
  function checkWin() {
    for (let combo of WINS) {
      const [a, b, c] = combo;
      if (board[a] && board[a] === board[b] && board[a] === board[c]) {
        return { winner: board[a], combo };
      }
    }
    if (board.every(v => v !== null)) return { winner: 'draw', combo: [] };
    return null;
  }

  // ──── Render ────
  function renderCell(i, val) {
    const cell = cells[i];
    const inner = cell.querySelector('.cell-inner');
    inner.innerHTML = '';
    cell.classList.add('taken');
    if (val === 'X') {
      const sym = document.createElement('div');
      sym.className = 'sym-x';
      inner.appendChild(sym);
      requestAnimationFrame(() => sym.classList.add('revealed'));
    } else if (val === 'O') {
      const sym = document.createElement('div');
      sym.className = 'sym-o';
      inner.appendChild(sym);
      requestAnimationFrame(() => sym.classList.add('revealed'));
    }
  }

  function renderBoard() {
    cells.forEach(cell => {
      const i = parseInt(cell.dataset.i);
      const inner = cell.querySelector('.cell-inner');
      inner.innerHTML = '';
      cell.classList.remove('taken', 'winning');
      if (board[i]) renderCell(i, board[i]);
    });
    winLine.setAttribute('opacity', '0');
    resultOverlay.classList.remove('show');
    gameOver = false;
  }

  function highlightWin(combo, winner) {
    if (winner === 'draw') return;
    combo.forEach(i => cells[i].classList.add('winning'));

    // SVG viewBox is 330x330, each cell center:
    const positions = [
      [55, 55], [165, 55], [275, 55],
      [55, 165], [165, 165], [275, 165],
      [55, 275], [165, 275], [275, 275]
    ];
    if (combo.length >= 2) {
      const [a, b] = [combo[0], combo[combo.length-1]];
      winLine.setAttribute('x1', positions[a][0]);
      winLine.setAttribute('y1', positions[a][1]);
      winLine.setAttribute('x2', positions[b][0]);
      winLine.setAttribute('y2', positions[b][1]);
      setTimeout(() => winLine.setAttribute('opacity', '1'), 50);
    }
  }

  function updateTurnUI() {
    const isMyTurn = currentTurn === myRole;
    const canPlay = isMyTurn && !gameOver;

    cells.forEach(cell => {
      const i = parseInt(cell.dataset.i);
      if (board[i] !== null) return;
      cell.classList.toggle('disabled', !canPlay);
    });

    badgeX.classList.toggle('active-turn', currentTurn === 'X' && !gameOver);
    badgeO.classList.toggle('active-turn', currentTurn === 'O' && !gameOver);

    const connected = conn && conn.open;
    if (connected && !gameOver) {
      const turnLabel = isMyTurn ? "Your turn" : "Opponent's turn";
      setStatus('connected', turnLabel + ` &mdash; <strong>You are ${myRole}</strong>`);
    }
  }

  function updateScores() {
    document.getElementById('score-x').textContent = scores.X;
    document.getElementById('score-o').textContent = scores.O;
  }

  function addYouTag(role) {
    const badge = role === 'X' ? badgeX : badgeO;
    if (!badge.querySelector('.you-tag')) {
      const tag = document.createElement('div');
      tag.className = 'you-tag';
      tag.textContent = 'YOU';
      badge.appendChild(tag);
    }
  }

  // ──── Result overlay ────
  function showResult(title, sub, winner) {
    resultText.textContent = title;
    resultSub.textContent = sub;
    if (winner === 'X') resultText.style.color = 'var(--x-color)';
    else if (winner === 'O') resultText.style.color = 'var(--o-color)';
    else resultText.style.color = 'var(--win-color)';
    resultOverlay.classList.add('show');
  }

  // ──── Play again ────
  resultAgainBtn.addEventListener('click', () => {
    doReset(true);
    send({ type: 'reset' });
  });

  function doReset() {
    board = Array(9).fill(null);
    currentTurn = 'X';
    gameOver = false;
    winLine.setAttribute('opacity', '0');
    cells.forEach(cell => {
      cell.classList.remove('taken', 'winning', 'disabled');
      cell.querySelector('.cell-inner').innerHTML = '';
    });
    resultOverlay.classList.remove('show');
    updateTurnUI();
  }

  // ──── New game room ────
  newGameBtn.addEventListener('click', () => {
    if (conn) conn.close();
    if (peer) peer.destroy();
    conn = null;
    peer = null;
    board = Array(9).fill(null);
    scores = { X: 0, O: 0 };
    gameOver = false;
    myRole = null;
    updateScores();
    document.querySelectorAll('.you-tag').forEach(t => t.remove());
    badgeX.classList.remove('active-turn');
    badgeO.classList.remove('active-turn');
    cells.forEach(cell => {
      cell.classList.remove('taken','winning','disabled');
      cell.querySelector('.cell-inner').innerHTML = '';
    });
    resultOverlay.classList.remove('show');
    winLine.setAttribute('opacity','0');
    loadingScreen.classList.remove('hidden');
    initPeer();
  });

  // ──── Copy link ────
  copyBtn.addEventListener('click', () => {
    const url = shareUrl.textContent;
    navigator.clipboard.writeText(url).then(() => {
      copyBtn.textContent = 'Copied!';
      copyBtn.classList.add('copied');
      setTimeout(() => {
        copyBtn.textContent = 'Copy';
        copyBtn.classList.remove('copied');
      }, 2000);
    });
  });

  // ──── Helpers ────
  function setStatus(type, html) {
    statusDot.className = 'status-dot ' + type;
    statusText.innerHTML = html;
  }

  function hideLoading() {
    setTimeout(() => loadingScreen.classList.add('hidden'), 500);
  }

  function showDisconnect() {
    disconnectNotice.classList.add('show');
    setTimeout(() => disconnectNotice.classList.remove('show'), 4000);
  }

  // Hide share panel for guest
  if (!isHost) { sharePanel.style.display = 'none'; newGameBtn.style.display = 'none'; }

  // ──── Start ────
  initPeer();
})();
</script>
</body>
</html>
